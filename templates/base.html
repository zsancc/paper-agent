<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}论文管理多Agent平台{% endblock %}</title>
<style>
  :root {
    --bg:#F6F4EF; --surface:#FFFFFF; --surface-2:#FBFAF7;
    --ink:#1E293B; --ink-soft:#5A6572; --ink-faint:#8A94A0;
    --line:#E6E2D9; --line-strong:#D8D2C6;
    --accent:#B5651D; --accent-soft:#FBEAD3; --accent-ink:#7A430F;
    --slate:#4A5568; --slate-soft:#EBEDF1;
    --ok:#2F7A4F; --ok-soft:#E3F2E7;
    --warn:#9A6A0B; --warn-soft:#FBEFD3;
    --danger:#B23B3B; --danger-soft:#F7E4E4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#12151B; --surface:#1A1F27; --surface-2:#161B22;
      --ink:#E7EAF0; --ink-soft:#A6B0BD; --ink-faint:#78828F;
      --line:#2A313B; --line-strong:#36404C;
      --accent:#E0A45E; --accent-soft:#3A2B18; --accent-ink:#EDBE85;
      --slate:#9AA6B6; --slate-soft:#232A33;
      --ok:#5FB483; --ok-soft:#1E2E24;
      --warn:#D6A24A; --warn-soft:#2E2717;
      --danger:#E07A7A; --danger-soft:#2E1D1D;
    }
  }
  * { box-sizing:border-box; }
  html { -webkit-text-size-adjust:100%; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    font-size:14px; line-height:1.6; }
  a { color:var(--accent); text-decoration:none; }

  /* ---- top nav ---- */
  .nav { position:sticky; top:0; z-index:50; background:var(--surface);
    border-bottom:1px solid var(--line); }
  .nav-inner { max-width:1100px; margin:0 auto; padding:0 24px;
    display:flex; align-items:center; gap:8px; height:58px; }
  .brand { font-weight:700; font-size:15px; margin-right:14px; color:var(--ink); white-space:nowrap; }
  .brand .dotmark { color:var(--accent); }
  .nav-links { display:flex; gap:2px; flex:1; flex-wrap:wrap; }
  .nav-links a { padding:7px 14px; border-radius:8px; color:var(--ink-soft); font-size:13.5px; font-weight:500; }
  .nav-links a:hover { background:var(--surface-2); color:var(--ink); }
  .nav-links a.active { background:var(--accent-soft); color:var(--accent-ink); font-weight:600; }
  .nav-status { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .pill { display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:4px 11px;
    border-radius:999px; border:1px solid var(--line); background:var(--surface-2); color:var(--ink-soft); white-space:nowrap; }
  .dot { width:7px; height:7px; border-radius:50%; }
  .dot.live { background:var(--ok); } .dot.demo { background:var(--warn); }

  /* ---- layout ---- */
  .wrap { max-width:1100px; margin:0 auto; padding:30px 24px 72px; }
  .page-head { margin-bottom:22px; }
  .page-head h1 { font-size:22px; margin:0 0 4px; }
  .page-head p { color:var(--ink-soft); font-size:13.5px; margin:0; }

  .card { background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:22px; margin-bottom:20px; }
  .card h2 { font-size:15px; margin:0 0 14px; }
  .card h2 .muted { color:var(--ink-faint); font-weight:500; font-size:13px; }

  /* ---- forms ---- */
  label { font-size:12.5px; color:var(--ink-soft); display:block; margin-bottom:5px; }
  input[type=text], input[type=password], input[type=number], select, textarea {
    width:100%; border:1px solid var(--line-strong); border-radius:9px; padding:10px 12px;
    font-size:13.5px; font-family:inherit; background:var(--surface-2); color:var(--ink); }
  input:focus, textarea:focus, select:focus { outline:2px solid var(--accent-soft); border-color:var(--accent); }
  textarea { resize:vertical; min-height:70px; line-height:1.6; }
  .row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }
  .row .grow { flex:1; min-width:220px; }
  .field { margin-bottom:14px; }

  button, .btn { background:var(--accent); color:#fff; border:none; border-radius:9px;
    padding:10px 20px; font-size:13.5px; cursor:pointer; font-weight:600; white-space:nowrap;
    display:inline-flex; align-items:center; gap:7px; }
  button:hover, .btn:hover { filter:brightness(1.05); }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .btn-sec { background:var(--slate-soft); color:var(--slate); }
  .btn-ghost { background:transparent; color:var(--ink-soft); border:1px solid var(--line-strong); }
  .btn-danger { background:transparent; color:var(--danger); border:1px solid var(--line-strong); }
  .btn-danger:hover { border-color:var(--danger); background:var(--danger-soft); }
  .btn-tiny { padding:4px 11px; font-size:11.5px; font-weight:500; }
  .hint { font-size:11.5px; color:var(--ink-faint); margin-top:8px; }

  /* ---- misc ---- */
  .chip { display:inline-block; padding:2px 9px; border-radius:999px; font-size:11px; white-space:nowrap; }
  .chip-ok { background:var(--ok-soft); color:var(--ok); }
  .chip-arb { background:var(--warn-soft); color:var(--warn); }
  .chip-neutral { background:var(--slate-soft); color:var(--slate); }
  .chip-manual { background:var(--accent-soft); color:var(--accent-ink); }
  .badge-arb { display:inline-block; background:var(--warn); color:#fff; font-size:10px;
    padding:1px 7px; border-radius:999px; margin-left:6px; vertical-align:middle; }
  .empty { color:var(--ink-faint); font-size:13px; padding:14px 0; }
  .flash { background:var(--accent-soft); color:var(--accent-ink); border:1px solid var(--accent);
    border-radius:9px; padding:10px 14px; font-size:13px; margin-bottom:18px; }

  /* ---- running job ---- */
  .job-panel { background:#12161d; border-radius:11px; padding:16px; margin-top:14px; }
  .job-status { display:flex; align-items:center; gap:10px; color:#d6e2f0; font-size:13px; margin-bottom:10px; }
  .spinner { width:14px; height:14px; border:2px solid #3a4658; border-top-color:var(--accent);
    border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  pre.log { color:#c7d3e3; font-size:11.5px; line-height:1.65; margin:0; max-height:420px; overflow:auto;
    font-family:"SFMono-Regular",Consolas,monospace; white-space:pre-wrap; }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:10px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--ink-soft); font-weight:600; font-size:12px; }
  tr:hover td { background:var(--surface-2); }
  a.title-link { color:var(--ink); border-bottom:1px dashed var(--line-strong); }
  a.title-link:hover { color:var(--accent); border-bottom-color:var(--accent); }
  .num { font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <span class="brand">论文管理<span class="dotmark">·</span>多Agent平台</span>
    <div class="nav-links">
      <a href="{{ url_for('library') }}" class="{{ 'active' if active=='library' else '' }}">文献库</a>
      <a href="{{ url_for('discover') }}" class="{{ 'active' if active=='discover' else '' }}">发现</a>
      <a href="{{ url_for('ask_page') }}" class="{{ 'active' if active=='ask' else '' }}">问答</a>
      <a href="{{ url_for('settings_page') }}" class="{{ 'active' if active=='settings' else '' }}">设置</a>
    </div>
    <div class="nav-status">
      <span class="pill"><span class="dot {{ 'live' if llm_live else 'demo' }}"></span>{{ ('LLM 真实·' + (llm_provider or '')) if llm_live else 'LLM 演示模式' }}</span>
      <span class="pill">藏书 {{ kb_count }}</span>
    </div>
  </div>
</nav>

<div class="wrap">
  {% with msgs = get_flashed_messages() %}
    {% if msgs %}<div class="flash">{{ msgs[0] }}</div>{% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<script>
(function(){
  var el = document.getElementById('job');
  if(!el || el.dataset.status !== 'running') return;
  var id = el.dataset.jobId;
  var logBox = document.getElementById('job-log');
  var tick = setInterval(function(){
    fetch('api/job/' + id).then(function(r){ return r.json(); }).then(function(j){
      if(logBox){ logBox.textContent = j.log || ''; logBox.scrollTop = logBox.scrollHeight; }
      if(j.status !== 'running'){ clearInterval(tick); window.location.reload(); }
    }).catch(function(){});
  }, 1500);
})();
</script>
</body>
</html>
